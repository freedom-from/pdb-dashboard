name: Update dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Recreate auth.json from gzipped secret
        shell: bash
        run: |
          echo "${{ secrets.AUTH_JSON_GZ_B64 }}" | base64 --decode | gunzip > auth.json

      - name: Run Fantrax counts
        run: node roster_counts.cjs

      - name: Run pick requirements join
        run: node picks_2026_milb.mjs

      - name: Build static site
        run: node build_dashboard.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
